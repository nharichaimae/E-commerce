security:
    password_hashers:
        App\Entity\User: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            form_login:
                login_path: app_auth
                check_path: app_auth
                default_target_path: auth_show 
                username_parameter: _username
                password_parameter: _password

            logout:
                path: app_logout
                target: app_auth